name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      # ADD THIS STEP FIRST
      - name: Check token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "ERROR: HF_TOKEN is empty"
            exit 1
          else
            echo "Token is set, length: ${#HF_TOKEN}"
          fi

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://Mangesh1:${HF_TOKEN}@huggingface.co/spaces/Mangesh1/search_engine_llm
          git push hf main --force
